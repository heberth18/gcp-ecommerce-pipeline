version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: country
        tests:
          - not_null
      - name: registration_date
        tests:
          - not_null

  - name: dim_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
      - name: category
        tests:
          - not_null
      - name: is_active
        tests:
          - not_null

  - name: fct_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'confirmed', 'shipped', 'delivered', 'cancelled', 'returned']

  - name: fct_order_items
    columns:
      - name: order_item_id
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: quantity
        tests:
          - not_null
      - name: subtotal
        tests:
          - not_null
  - name: kpi_revenue_by_month
    columns:
      - name: month
        tests:
          - unique
          - not_null
      - name: total_orders
        tests:
          - not_null
      - name: total_revenue
        tests:
          - not_null

  - name: kpi_revenue_by_category
    columns:
      - name: category
        tests:
          - unique
          - not_null
      - name: total_revenue
        tests:
          - not_null
      - name: total_units_sold
        tests:
          - not_null

  - name: kpi_orders_by_status
    columns:
      - name: order_status
        tests:
          - unique
          - not_null
      - name: total_orders
        tests:
          - not_null

  - name: kpi_revenue_by_country
    columns:
      - name: country
        tests:
          - unique
          - not_null
      - name: total_revenue
        tests:
          - not_null
      - name: total_orders
        tests:
          - not_null