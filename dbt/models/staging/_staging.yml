version: 2

sources:
  - name: bronze
    project: ecommerce-data-platform-497218
    dataset: bronze
    tables:
      - name: customers
      - name: products
      - name: orders
      - name: order_items
      - name: payments
      - name: inventory

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
      - name: email
        tests:
          - not_null
          - unique
      - name: first_name
        tests:
          - not_null   

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - not_null
          - unique
      - name: category
        tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'confirmed', 'shipped', 'delivered', 'cancelled', 'returned']

  - name: stg_order_items
    columns:
      - name: order_item_id
        tests:
          - not_null
          - unique
      - name: unit_price
        tests:
          - not_null

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: payment_method
        tests:
          - not_null
          - accepted_values:
              values: ['credit_card', 'debit_card', 'paypal', 'bank_transfer', 'unknown']
      - name: amount
        tests:
          - not_null
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'completed', 'failed', 'refunded']

  - name: stg_inventory
    columns:
      - name: inventory_id
        tests:
          - not_null
          - unique
      - name: last_restock_date
        tests:
          - not_null